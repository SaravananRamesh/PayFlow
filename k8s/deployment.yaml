apiVersion: apps/v1
kind: Deployment
metadata:
  name: payflow-app
  labels:
    app: payflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payflow
  template:
    metadata:
      labels:
        app: payflow
    spec:
      # ── Pod AntiAffinity: spread app pods across different nodes for HA ──
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - payflow
              topologyKey: "kubernetes.io/hostname"
      containers:
        - name: payflow
          image: registry.digitalocean.com/payflow-registry/payflow:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payflow-secrets
                  key: ADMIN_PASSWORD
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "payflow"
            - name: DB_USER
              value: "payflow"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payflow-secrets
                  key: DB_PASSWORD
